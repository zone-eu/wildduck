# This is a basic workflow that is manually triggered
name: Slack

# Controls when the action will run. Workflow runs when manually triggered using the UI or API.
on:
    push:
        branches:
            - 'master'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
    send_webhook:
        # The type of runner that the job will run on
        runs-on: ubuntu-latest

        # Steps represent a sequence of tasks that will be executed as part of the job
        steps:
            # Runs a single command using the runners shell
            - name: Webhook
              env:
                  webhook_url: ${{ secrets.ZONE_WEBHOOK_URL }}
                  curl_options: '--fail -s'
                  GITHUB_ACTOR_NAME: ${{ github.actor }}
                  GITHUB_REPOSITORY_NAME: ${{ github.repository }}
                  GITHUB_SHA_VALUE: ${{ github.sha }}
                  GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
                  GITHUB_HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
              run: |
                  data="$(
                    python3 - <<'PY'
                    import json
                    import os

                    sha = os.environ["GITHUB_SHA_VALUE"]
                    text = (
                        f'*{os.environ["GITHUB_ACTOR_NAME"]}* pushed '
                        f'<https://github.com/{os.environ["GITHUB_REPOSITORY_NAME"]}/commit/{sha}|{sha}> '
                        f'to *{os.environ["GITHUB_REF_NAME_VALUE"]}*\n'
                        f' {os.environ["GITHUB_HEAD_COMMIT_MESSAGE"]}'
                    )
                    print(json.dumps({"channel": "wildduck-changelog", "text": text}))
                    PY
                  )"
                  curl $curl_options \
                  -H "Content-Type: application/json" \
                  -H "User-Agent: GitHub-Action" \
                  --data "$data" "$webhook_url"
